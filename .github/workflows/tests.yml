name: CI/CD Acadêmico
on: [push]

jobs:
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Setup Python
        uses: actions/setup-python@v2
        with: {python-version: 3.9}
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov locust
      
      - name: Run Unit Tests
        run: pytest tests/ --cov=core --cov-report=html
      
      - name: Run Load Test
        run: locust -f tests/test_carga.py --headless -u 100 -r 10 --run-time 1m
      
      - name: Upload Reports
        uses: actions/upload-artifact@v2
        with:
          name: qa-reports
          path: |
            htmlcov/
            relatorios/